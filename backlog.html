<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Backlog — 3D Print Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0b;
      --surface:      #111114;
      --surface2:     #1a1a1f;
      --border:       rgba(255,255,255,0.07);
      --border2:      rgba(255,255,255,0.12);
      --text:         #eeeef3;
      --text2:        #888898;
      --text3:        #b8b8cc;
      --green:        #00e5a0;
      --green-dim:    rgba(0,229,160,0.09);
      --green-border: rgba(0,229,160,0.28);
      --orange:       #ff6b35;
      --orange-dim:   rgba(255,107,53,0.09);
      --orange-border:rgba(255,107,53,0.3);
      --purple:       #7b6ef6;
      --r:            10px;
    }
    html[data-theme="light"] {
      --bg:           #f2f2f7;
      --surface:      #ffffff;
      --surface2:     #eaeaf2;
      --border:       rgba(0,0,0,0.07);
      --border2:      rgba(0,0,0,0.13);
      --text:         #0f0f1a;
      --text2:        #606075;
      --text3:        #3e3e55;
      --green:        #009a6a;
      --green-dim:    rgba(0,154,106,0.09);
      --green-border: rgba(0,154,106,0.28);
      --orange:       #d04a14;
      --orange-dim:   rgba(208,74,20,0.09);
      --orange-border:rgba(208,74,20,0.28);
      --purple:       #5648d4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', system-ui, sans-serif;
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 11px;
      text-decoration: none; color: inherit;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--green);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: #0a0a0b;
    }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub  { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
    .theme-btn {
      background: none; border: 1px solid var(--border2);
      color: var(--text2); border-radius: 6px;
      padding: 5px 9px; cursor: pointer; font-size: 14px;
    }
    .theme-btn:hover { color: var(--text); }

    /* ── Layout ── */
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Markdown styles ── */
    #content h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    #content > p:first-of-type {
      color: var(--text2); font-size: 13px;
      margin-bottom: 32px;
      font-family: 'DM Mono', monospace;
    }
    #content h2 {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text2);
      margin: 40px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2);
    }
    #content hr { display: none; }

    /* ── Backlog item cards ── */
    #content h3 {
      font-size: 15px; font-weight: 700;
      margin: 0;
      color: var(--text);
    }

    /* Each item is the block between two <hr>s — we simulate cards via JS */
    .backlog-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 20px 22px;
      margin-bottom: 12px;
    }
    .backlog-card h3 { margin-bottom: 12px; }
    .backlog-card p  { font-size: 13px; color: var(--text3); margin-bottom: 10px; line-height: 1.6; }
    .backlog-card ul { padding-left: 18px; font-size: 13px; color: var(--text3); margin-bottom: 10px; }
    .backlog-card li { margin-bottom: 4px; }
    .backlog-card strong { color: var(--text); font-weight: 600; }
    .backlog-card blockquote {
      border-left: 3px solid var(--border2);
      padding-left: 12px;
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      margin: 8px 0;
    }
    .backlog-card code {
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Status badges ── */
    .badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 4px;
      font-family: 'DM Mono', monospace;
    }
    .badge-idea     { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
    .badge-planned  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .badge-progress { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-border); }
    .badge-done     { background: rgba(123,110,246,0.1); color: var(--purple); border: 1px solid rgba(123,110,246,0.3); }

    .card-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .scope-tag {
      font-size: 10px; font-family: 'DM Mono', monospace;
      color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Loading / error ── */
    .loading { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 13px; padding: 40px 0; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .logo-sub { display: none; }
      .container { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="https://3dprintassistant.com">
      <div class="logo-mark">3D</div>
      <div>
        <div class="logo-text">3D Print Assistant</div>
        <div class="logo-sub">Feature Backlog</div>
      </div>
    </a>
    <button class="theme-btn" id="themeBtn">☀</button>
  </header>

  <div class="container">
    <div id="content"><p class="loading">Loading backlog…</p></div>
  </div>

  <script>
    // ── Theme toggle ──
    const root = document.documentElement;
    const btn  = document.getElementById('themeBtn');
    try {
      const saved = localStorage.getItem('3dpa_theme');
      if (saved) { root.dataset.theme = saved; btn.textContent = saved === 'dark' ? '☀' : '☾'; }
    } catch (_) {}
    btn.addEventListener('click', () => {
      const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
      root.dataset.theme = next;
      btn.textContent = next === 'dark' ? '☀' : '☾';
      try { localStorage.setItem('3dpa_theme', next); } catch (_) {}
    });

    // ── Fetch and render BACKLOG.md ──
    fetch('BACKLOG.md')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => {
        // Split on HR (---) to get individual item blocks
        const rawHtml = marked.parse(md);
        const el = document.getElementById('content');
        el.innerHTML = rawHtml;

        // Post-process: wrap each h3 block into a card
        wrapItemsInCards(el);

        // Post-process: turn "Status: X" strong tags into badges
        applyBadges(el);
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          `<p class="loading">Failed to load BACKLOG.md (${err.message}). Make sure you're serving the site locally or accessing it via Cloudflare Pages.</p>`;
      });

    function wrapItemsInCards(container) {
      const children = Array.from(container.children);
      let cardEl = null;

      children.forEach(child => {
        if (child.tagName === 'H3') {
          cardEl = document.createElement('div');
          cardEl.className = 'backlog-card';
          child.parentNode.insertBefore(cardEl, child);
          cardEl.appendChild(child);
        } else if (child.tagName === 'HR') {
          cardEl = null;
          child.remove();
        } else if (cardEl) {
          cardEl.appendChild(child);
        }
      });
    }

    function applyBadges(container) {
      container.querySelectorAll('.backlog-card p').forEach(p => {
        p.innerHTML = p.innerHTML
          .replace(/\*\*Status:\*\*\s*(Idea)/g,        '<span class="badge badge-idea">Idea</span>')
          .replace(/\*\*Status:\*\*\s*(Planned)/g,     '<span class="badge badge-planned">Planned</span>')
          .replace(/\*\*Status:\*\*\s*(In Progress)/g, '<span class="badge badge-progress">In Progress</span>')
          .replace(/\*\*Status:\*\*\s*(Done)/g,        '<span class="badge badge-done">Done</span>');
      });

      // Also move meta info (Status, Scope) into a card-meta div
      container.querySelectorAll('.backlog-card').forEach(card => {
        const paras = Array.from(card.querySelectorAll('p'));
        const metaPara = paras.find(p => p.innerHTML.includes('badge') || p.textContent.includes('Scope:'));
        if (metaPara) {
          metaPara.innerHTML = metaPara.innerHTML
            .replace(/\*\*Scope:\*\*\s*(\w+)/g, '<span class="scope-tag">$1</span>')
            .replace(/\*\*Added:\*\*[^\n<]*/g, '')
            .replace(/\*\*Source:\*\*[^\n<]*/g, '')
            .replace(/<br\s*\/?>/g, '');
          metaPara.className = 'card-meta';
        }
      });
    }
  </script>
</body>
</html>
