name = "3dprintassistant"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

# Worker entrypoint. Required so Cloudflare classifies this deployment as
# "assets + worker" instead of "static assets only". Without `main`, the
# Variables & Secrets UI is locked and functions/ is never routed.
main = "worker.js"

# Static site bindings. `directory = "."` serves everything in the repo root
# as public assets. See .assetsignore for the exclusion list.
[assets]
directory = "."
binding = "ASSETS"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "3dpa_usage_v1"

# Intake queue for missing-printer feedback (Printer Intake Scout pipeline).
# The /api/feedback Function tees `missingPrinter` submissions here, fail-open.
# Binding name must stay "PRINTER_INTAKE" — feedback.js reads env.PRINTER_INTAKE.
[[kv_namespaces]]
binding = "PRINTER_INTAKE"
id = "f3d89a4e70a34e3fab1c0f7676efebb5"
